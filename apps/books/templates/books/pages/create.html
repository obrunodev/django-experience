{% extends 'base.html' %}
{% block title %}Cadastrar livro{% endblock title %}
{% block content %}

    {% include 'partials/navbar.html' %}

    <div class="container mt-3">
        <h3>Novo livro</h3>

        <div class="row">
            {% for form in formset %}
                {% for field in form %}
                    <div class="col-lg-4">
                        <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
            {% endfor %}
        </div>

        <button type="submit" class="btn btn-primary mt-3">Adicionar</button>
    </div>

{% endblock content %}
