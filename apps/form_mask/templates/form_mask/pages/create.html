{% extends 'base.html' %}
{% block title %}Nova pessoa{% endblock title %}
{% block content %}

    {% include 'partials/navbar.html' %}

    <div class="container mt-3">
        <h3 class="my-3">Cadastrar pessoa</h3>

        <div class="card">
            <div class="card-body">
                <form action="{% url 'form_mask:create' %}" method="post">
                    {% csrf_token %}
        
                    <div class="row">
                        {% for field in form %}
                            <div class="col-md-6">
                                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                                {{ field }}
                            </div>
                        {% endfor %}
                    </div>
        
                    <button type="submit" class="btn btn-primary mt-3">Cadastrar</button>
                </form>
            </div>
        </div>
    </div>

{% endblock content %}

{% block js %}
    <script>
        var SPMaskBehavior = function (val) { return val.replace(/\D/g, '').length === 11 ? '(00) 00000-0000' : '(00) 0000-00009'; },
        spOptions = {
            onKeyPress: function(val, e, field, options) {
                field.mask(SPMaskBehavior.apply({}, arguments), options);
            }
        };
        $(document).ready(function() {
            $('.mask-cpf').mask('000.000.000-00', {reverse: true});
            $('.mask-date').mask('00/00/0000');
            $('.mask-phone').mask(SPMaskBehavior, spOptions);
        });
    </script>
{% endblock js %}
