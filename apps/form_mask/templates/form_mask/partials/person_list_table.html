<table class="table table-bordered table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Data de nascimento</th>
            <th>Telefone</th>
        </tr>
    </thead>
    <tbody>
        {% for person in people %}
            <tr>
                <td>{{ person.name }}</td>
                <td>{{ person.cpf }}</td>
                <td>{{ person.birth_date }}</td>
                <td>{{ person.phone }}</td>
            </tr>
        {% endfor %}
    </tbody>
</table>
