<table class="table table-bordered table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Data de nascimento</th>
            <th class="text-center">Opções</th>
        </tr>
    </thead>
    <tbody>
        {% for customer in page_obj %}
            <tr>
                <td>{{ customer.name }}</td>
                <td>{{ customer.cpf }}</td>
                <td>{{ customer.birth_date }}</td>
                <td class="d-flex justify-content-center">
                    <a href="{% url 'formset_test:phone_create' customer.pk %}" class="btn btn-warning btn-sm">Telefones</a>
                    <form action="{% url 'formset_test:customers_delete' customer.pk %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm ms-2">Remover</a>
                    </form>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
